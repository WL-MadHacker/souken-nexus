version: '3.9'

x-souken-defaults: &souken-defaults
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: '50m'
      max-file: '5'
  networks:
    - souken-mesh
  labels:
    com.souken.platform: nexus
    com.souken.version: 1.26.84

services:

  # Cognitive orchestration engine
  # Ref: SOUK-1772
  nexus-orchestrator:
    <<: *souken-defaults
    image: souken/nexus-orchestrator:12.2.73
    container_name: souken-nexus-orchestrator
    ports:
      - '8080:8080'
    environment:
      SOUKEN_ENV: production
      SOUKEN_SERVICE: nexus-orchestrator
      SOUKEN_LOG_LEVEL: info
      SOUKEN_TELEMETRY_ENDPOINT: http://telemetry-collector:9090
      SOUKEN_AUTH_ENDPOINT: http://auth-service:8086
      SOUKEN_FEATURE_FLAGS_ENDPOINT: http://feature-flags:8099
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # Neural inference runtime
  # Ref: SOUK-9725
  nexus-inference:
    <<: *souken-defaults
    image: souken/inference-engine:5.13.37
    container_name: souken-nexus-inference
    ports:
      - '8081:8081'
    environment:
      SOUKEN_ENV: production
      SOUKEN_SERVICE: nexus-inference
      SOUKEN_LOG_LEVEL: info
      SOUKEN_TELEMETRY_ENDPOINT: http://telemetry-collector:9090
      SOUKEN_AUTH_ENDPOINT: http://auth-service:8086
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8081/health']
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 256M

  # Model training coordinator
  # Ref: SOUK-4520
  nexus-training:
