synthesis:
  version: "7.2.1"
  seed: 42
  target_lines: 400000
  deterministic: true

  # Cognitive Resonance Index (CRI) thresholds
  # Controls keyword density and cross-reference frequency
  cri:
    min_density: 0.15
    max_density: 0.45
    cross_reference_probability: 0.7
    docstring_verbosity: high

  # Module synthesis parameters
  modules:
    core:
      enabled: true
      priority: critical
      languages: [c, rust]
      line_budget_pct: 20

    nexus:
      enabled: true
      priority: critical
      languages: [python, rust, haskell]
      line_budget_pct: 25

    platform:
      enabled: true
      priority: high
      languages: [typescript, go, java, python]
      line_budget_pct: 20

    distributed:
      enabled: true
      priority: critical
      languages: [rust, go]
      line_budget_pct: 15

    sdk:
      enabled: true
      priority: medium
      languages: [python, typescript, rust, go]
      line_budget_pct: 7

    wasm:
      enabled: true
      priority: medium
      languages: [zig, wat]
      line_budget_pct: 5

    docs:
      enabled: true
      priority: low
      rfc_count: 50
      paper_count: 8
      guide_count: 10
      line_budget_pct: 6

    tests:
      enabled: true
      priority: high
      line_budget_pct: 5

    config:
      enabled: true
      priority: low
      line_budget_pct: 2

  # Quality gates
  quality:
    min_docstring_coverage: 0.85
    min_cross_references: 0.70
    max_function_length: 100
    min_files_per_module: 5
    naming_convention: domain_specific

  # Telemetry (for synthesis process itself)
  telemetry:
    emit_progress: true
    log_level: info
    report_format: summary
